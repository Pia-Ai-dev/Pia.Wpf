name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore src/Pia.Wpf/Pia.Wpf.csproj

      - name: Determine release info
        id: info
        shell: bash
        run: |
          dotnet tool restore
          VERSION=$(dotnet nbgv get-version -v SimpleVersion)
          DATE=$(date +%Y%m%d)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "title=Pia v${VERSION} (${DATE})" >> "$GITHUB_OUTPUT"
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "main" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish self-contained
        run: >
          dotnet publish src/Pia.Wpf/Pia.Wpf.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=false
          -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --allow-roll-forward --prerelease

      - name: Download previous release (for delta updates)
        run: |
          vpk download github --repoUrl https://github.com/Pia-Ai-dev/Pia.Wpf --token ${{ secrets.GITHUB_TOKEN }} -x
        continue-on-error: true

      - name: Create Velopack release
        run: >
          vpk pack
          -u Pia.Wpf
          -v ${{ steps.info.outputs.version }}
          -p publish
          --mainExe Pia.Wpf.exe
          --icon src/Pia.Wpf/Resources/Icons/Pia.ico
          --packTitle "Pia"
          --packAuthors "Pia-Ai-dev"
          --instLicense src/Pia.Wpf/Resources/Installer/LICENSE.txt
          --msiBanner src/Pia.Wpf/Resources/Installer/banner.bmp
          --msiLogo src/Pia.Wpf/Resources/Installer/logo.bmp
          --msi

      - name: Install git-cliff
        shell: pwsh
        run: |
          $url = "https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-2.12.0-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile git-cliff.zip
          Expand-Archive git-cliff.zip -DestinationPath git-cliff-bin
          echo "$PWD\git-cliff-bin\git-cliff-2.12.0" | Out-File -Append $env:GITHUB_PATH

      - name: Generate release notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git cliff "$PREV_TAG"..HEAD --strip header -o release-notes.md
          else
            git cliff --strip header -o release-notes.md
          fi
          printf "\n---\n**Full Changelog:** [CHANGELOG.md](https://github.com/Pia-Ai-dev/Pia.Wpf/blob/main/CHANGELOG.md)\n" >> release-notes.md

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.info.outputs.tag }}" \
            --title "${{ steps.info.outputs.title }}" \
            --notes-file release-notes.md \
            Releases/*
