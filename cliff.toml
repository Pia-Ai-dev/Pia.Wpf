[changelog]
header = """# Changelog\n\nAll notable changes to Pia are documented here.\n"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/Pia-Ai-dev/Pia.Wpf/pull/{{ commit.remote.pr_number }})){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
topo_order = true

commit_parsers = [
    { message = "^Merge pull request", skip = true },
    { message = "^Merge branch", skip = true },
    { message = "^\\[skip ci\\]", skip = true },
    { message = "(?i)^#?\\d*\\s*[Aa]dd|(?i)^[Ff]eat", group = "Features" },
    { message = "(?i)^#?\\d*\\s*[Ff]ix", group = "Bug Fixes" },
    { message = "(?i)^#?\\d*\\s*[Rr]efactor|(?i)^#?\\d*\\s*[Oo]ptimize|(?i)^#?\\d*\\s*[Ii]mprov", group = "Improvements" },
    { body = ".*", group = "Other" },
]

[remote.github]
owner = "Pia-Ai-dev"
repo = "Pia.Wpf"
